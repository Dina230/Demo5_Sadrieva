{% extends 'base.html' %}
{% block title %}Новая заявка{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-12">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h2 class="h4 mb-0"><i class="fas fa-file-alt"></i> Оформление заявки</h2>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Выберите курс</label>
                        {{ form.course_type }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Дата начала обучения</label>
                        {{ form.start_date }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Способ оплаты</label>
                        {{ form.payment_method }}
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-paper-plane"></i> Отправить заявку
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
